<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Car Parking | Login / Sign up</title>
    <link rel="stylesheet" th:href="@{/css/slide-auth.css}">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
</head>
<body>

<div style="position:fixed; top:10px; left:0; right:0; text-align:center;">
    <div th:if="${error}" style="display:inline-block;padding:6px 12px;border-radius:8px;background:#fee2e2;color:#b91c1c;font-size:13px;"
         th:text="${error}">
    </div>
    <div th:if="${success}" style="display:inline-block;padding:6px 12px;border-radius:8px;background:#dcfce7;color:#166534;font-size:13px;">
        <span th:text="${success}"></span>
    </div>
</div>

<div class="main">
    <input type="checkbox" id="chk" aria-hidden="true">

    <!-- SIGN UP -->
    <div class="signup">
        <form th:action="@{/register}" method="post">
            <label for="chk" aria-hidden="true">Sign up</label>

            <!-- name must match @RequestParam in controller -->
            <input type="text" name="fullName" placeholder="User name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="number" name="phoneNumber" placeholder="Phone number">
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Sign up</button>
        </form>
    </div>

    <!-- LOGIN -->
    <div class="login">
        <form th:action="@{/login}" method="post">
            <label for="chk" aria-hidden="true">Login</label>

            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>
    </div>
</div>
</body>
</html>
