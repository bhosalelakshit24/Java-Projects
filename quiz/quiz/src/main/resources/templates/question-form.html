<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Questions for ' + ${quiz.title}">Quiz Questions</title>
    <link rel="stylesheet" th:href="@{/css/quiz.css}">
</head>
<body>
<div class="layout">
    <header class="topbar">
        <div>
            <h1 th:text="${quiz.title}">Quiz title</h1>
            <p>Add questions to your quiz</p>
        </div>
        <a th:href="@{/quizzes}" class="btn">Finish</a>
    </header>

    <main style="display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap;">

        <!-- New question form -->
        <div class="form-card" style="flex:1 1 320px;">
            <h3 style="margin-top:0;">Add Question</h3>
            <form th:action="@{'/quizzes/' + ${quiz.id} + '/questions/save'}"
                  th:object="${question}" method="post">

                <label>Question</label>
                <textarea th:field="*{text}" rows="3" required></textarea>

                <label>Option A</label>
                <input type="text" th:field="*{optionA}" required>

                <label>Option B</label>
                <input type="text" th:field="*{optionB}" required>

                <label>Option C</label>
                <input type="text" th:field="*{optionC}" required>

                <label>Option D</label>
                <input type="text" th:field="*{optionD}" required>

                <label>Correct Option</label>
                <select th:field="*{correctOption}">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>

                <div class="form-actions">
                    <button type="submit" class="btn primary">Save Question</button>
                </div>
            </form>
        </div>

        <!-- List of added questions -->
        <div class="form-card" style="flex:1 1 320px;">
            <h3 style="margin-top:0;">Existing Questions</h3>

            <table class="table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Question</th>
                    <th>Correct</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="q,iter : ${questions}">
                    <td th:text="${iter.index + 1}">1</td>
                    <td th:text="${q.text}">Question text</td>
                    <td th:text="${q.correctOption}">A</td>
                    <td>
                        <a th:href="@{'/quizzes/' + ${quiz.id} + '/questions/delete/' + ${q.id}}"
                           class="btn small danger"
                           onclick="return confirm('Delete this question?');">
                            Delete
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(questions)}">
                    <td colspan="4">No questions yet. Add one on the left.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </main>
</div>
</body>
</html>
