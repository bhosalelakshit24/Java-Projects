<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Quiz</title>
    <link rel="stylesheet" th:href="@{/css/quiz.css}">
</head>
<body>
<div class="layout">
    <header class="topbar">
        <h1>Create a Quiz</h1>
        <a th:href="@{/quizzes}" class="btn">Back</a>
    </header>

    <main>
        <div class="form-card">
            <form th:action="@{/quizzes/builder/save}" th:object="${quiz}" method="post">

                <label>Title</label>
                <input type="text" th:field="*{title}" placeholder="e.g. Java Basics" required>

                <label>Category</label>
                <input type="text" th:field="*{category}" placeholder="e.g. Java, Networking…" required>

                <label>Description</label>
                <textarea th:field="*{description}" rows="3"
                          placeholder="Short description of this quiz"></textarea>

                <label>Total Questions (planned)</label>
                <input type="number" th:field="*{totalQuestions}" min="1" required>

                <label>Marks per Question</label>
                <input type="number" th:field="*{marksPerQuestion}" min="1" required>

                <div class="form-actions">
                    <a th:href="@{/quizzes}" class="btn">Cancel</a>
                    <button type="submit" class="btn primary">Next: Add Questions</button>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
