<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/quiz.css}">
</head>
<body>
<div class="layout">
    <header class="topbar">
        <div>
            <h1>Quiz Dashboard</h1>
            <p th:text="'Welcome, ' + ${name}">Welcome</p>
        </div>
        <div>
            <a th:href="@{/quizzes/new}" class="btn primary">+ Add Quiz</a>
            <a th:href="@{/quizzes/builder/new}" class="btn primary">+ Create Quiz</a>
            <a th:href="@{/logout}" class="btn">Logout</a>
        </div>
    </header>

    <main>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Description</th>
                <th>Total Qs</th>
                <th>Marks/Q</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="q : ${quizzes}">
                <td th:text="${q.id}">1</td>
                <td th:text="${q.title}">Java Basics</td>
                <td th:text="${q.category}">Java</td>
                <td th:text="${q.description}">Description here</td>
                <td th:text="${q.totalQuestions}">10</td>
                <td th:text="${q.marksPerQuestion}">1</td>
                <td>
                    <a th:href="@{'/quizzes/edit/' + ${q.id}}" class="btn small">Edit</a>
                    <a th:href="@{'/quizzes/delete/' + ${q.id}}" class="btn small danger"
                       onclick="return confirm('Delete this quiz?');">Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(quizzes)}">
                <td colspan="7">No quizzes yet. Click "Add Quiz" to create one.</td>
            </tr>
            </tbody>
        
            
        </table>
    </main>
</div>
</body>
</html>
