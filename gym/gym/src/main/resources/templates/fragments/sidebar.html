<body>

        <div class="sidebar-logo">GA</div>

        <nav class="sidebar-nav">

               class="sidebar-link"

            <a th:href="@{/dashboard}"
               class="sidebar-link"

               class="sidebar-link"

               class="sidebar-link"
               th:classappend="${activePage == 'profile'} ? ' active'">

    </aside>

</html>
