<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Student Form</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="app">

    <!-- left sidebar -->
    <div th:replace="fragments/sidebar :: sidebar('attendance')"></div>

    <!-- main -->
    <main class="main">

        <!-- top bar -->
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="page-title" th:text="${formTitle}">Add New Student</h1>
                <span class="breadcrumb">Dashboard / Students / Form</span>
            </div>
        </header>

        <!-- big form card -->
        <section class="card big-form-card">

            <form th:action="${student.id} != null ? @{'/students/' + ${student.id}} : @{/students}"
                  th:object="${student}" method="post" class="big-student-form">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- personal info -->
                <div class="form-section">
                    <h2 class="section-title">Personal Information</h2>
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" th:field="*{name}" placeholder="Student full name" required>
                        </div>

                        <div class="form-group">
                            <label>Joined Date</label>
                            <input type="date" th:field="*{joinedDate}">
                        </div>
                    </div>
                </div>

                <!-- academic info -->
                <div class="form-section">
                    <h2 class="section-title">Academic Information</h2>
                    <div class="form-grid-3">
                        <div class="form-group">
                            <label>Year</label>
                            <select th:field="*{year}">
                                <option value="First Year">First Year</option>
                                <option value="Second Year">Second Year</option>
                                <option value="Third Year">Third Year</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Course</label>
                            <input type="text" th:field="*{course}" placeholder="e.g. BCA, BSc IT">
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select th:field="*{status}">
                                <option value="Active">Active</option>
                                <option value="On Leave">On Leave</option>
                                <option value="Graduated">Graduated</option>
                                <option value="Dropout">Dropout</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- actions -->
                <div class="form-actions right">
                    <a th:href="@{/home}" class="btn-secondary">Cancel</a>
                    <button type="submit" class="btn-primary">Save Student</button>
                </div>

            </form>

        </section>

    </main>

</div>
</body>
</html>
