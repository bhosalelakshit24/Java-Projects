<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Assignment Form</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>

<header class="topbar">
    <div class="logo">📚 Assignment Tracker</div>
    <nav>
        <a th:href="@{/home}">Back to Home</a>
    </nav>
</header>

<main class="container form-page">
    <h1 th:text="${formTitle}">Assignment Form</h1>

    <form th:object="${assignment}"
          th:action="${assignment.id} == null ? @{/assignments} : @{/assignments/{id}(id=${assignment.id})}"
          method="post"
          class="assignment-form">

        <div class="form-group">
            <label for="subject">Subject</label>
            <input id="subject" type="text" th:field="*{subject}" required>
        </div>

        <div class="form-group">
            <label for="title">Assignment Title</label>
            <input id="title" type="text" th:field="*{title}" required>
        </div>

        <div class="form-group">
            <label for="description">Description / Instructions</label>
            <textarea id="description" rows="5" th:field="*{description}"></textarea>
        </div>

        <div class="form-group">
            <label for="dueDate">Due Date</label>
            <input id="dueDate" type="date" th:field="*{dueDate}" required>
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" th:field="*{status}">
                <option value="PENDING">Pending</option>
                <option value="DONE">Done</option>
            </select>
        </div>

        <button type="submit" class="btn-primary">Save</button>
    </form>
</main>

</body>
</html>
