<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Digital Recipe Maker - Home</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body>

<header class="topbar">
    <div class="logo">🍽️ Digital Recipe Maker</div>
    <nav>
        <a th:href="@{/home}">Home</a>
        <a th:href="@{/recipes/new}" class="btn-small">+ Add Recipe</a>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit">Logout</button>
        </form>
    </nav>
</header>

<main class="container">
    <h1>Your Recipes</h1>

    <p th:if="${#lists.isEmpty(recipes)}">
        No recipes yet. <a th:href="@{/recipes/new}">Add your first recipe</a> 🍲
    </p>

    <div th:if="${!#lists.isEmpty(recipes)}" class="recipe-grid">
        <article class="recipe-card" th:each="recipe : ${recipes}">
            <h2 th:text="${recipe.title}">Recipe title</h2>
            <p class="preview">
                <span th:text="${#strings.abbreviate(recipe.ingredients, 120)}"></span>
            </p>

            <div class="actions">
                <a th:href="@{/recipes/edit/{id}(id=${recipe.id})}" class="btn-edit">Edit</a>

                <form th:action="@{/recipes/{id}/delete(id=${recipe.id})}" method="post"
                      onsubmit="return confirm('Delete this recipe?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-delete">Delete</button>
                </form>
            </div>
        </article>
    </div>
</main>

</body>
</html>
