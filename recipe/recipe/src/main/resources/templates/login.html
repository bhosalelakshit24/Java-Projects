<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recipe App</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>

<div class="content">
    <div class="text">Sign In</div>

    <!-- Messages -->
    <div th:if="${param.error}" class="alert alert-error">Invalid username or password</div>
    <div th:if="${param.logout}" class="alert alert-success">Logged out successfully</div>
    <div th:if="${param.registered}" class="alert alert-success">Registration successful! Login now.</div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="field">
            <span>👤</span>
            <input type="text" name="username" required>
            <label>Username</label>
        </div>

        <div class="field">
            <span>🔒</span>
            <input type="password" name="password" required>
            <label>Password</label>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="sign-up">
        Don't have an account?
        <a th:href="@{/register}">Register here</a>
    </div>
</div>

</body>
</html>
